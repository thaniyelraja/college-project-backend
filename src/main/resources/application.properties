# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.jpa.hibernate.ddl-auto=update
# Use 'update' for development (preserves data), 'validate' for production

# JPA / Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ─────────────────────────────────────────────────────────────────────────────
# API Keys — Fallback Waterfall Strategy
# Each API tries key[0] first. On failure (rate limit / error), tries key[1], etc.
# Add or remove keys by editing the comma-separated list.
# ─────────────────────────────────────────────────────────────────────────────

# OpenTripMap — 4 keys
api.opentripmap.keys=${API_OPENTRIPMAP_KEYS}

# OpenRouteService — 5 keys
api.ors.keys=${API_ORS_KEYS}

# OpenWeatherMap — 5 keys
api.openweather.keys=${API_OPENWEATHER_KEYS}

# Groq AI — 5 keys (waterfall before Gemini fallback)
api.groq.keys=${API_GROQ_KEYS}

# AI Fallback Tier 2 & 3 — single keys
api.gemini.key=${API_GEMINI_KEY}
api.openrouter.key=${API_OPENROUTER_KEY}

# OpenCage — kept for reference (not used in pipeline)
api.opencage.key=${API_OPENCAGE_KEY}

# Logging
logging.level.root=INFO
logging.level.com.newplanner=DEBUG

# Async Generation Thread Pool
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# Web Async Request Timeout
spring.mvc.async.request-timeout=600000
